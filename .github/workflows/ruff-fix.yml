name: Ruff Auto-Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ruff-fix:
    runs-on: ubuntu-latest
    permissions:
      # Required to allow the bot to commit fixes back to the repo
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the head branch of the PR, not the merge commit
          ref: ${{ github.head_ref }}

      - name: Run Ruff with Fix
        uses: astral-sh/ruff-action@v3
        with:
          # Tells Ruff to fix all autofixable violations
          args: format --diff && ruff check --fix

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix linting errors with Ruff"
